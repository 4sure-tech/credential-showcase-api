# Traefik Helm chart values
traefik:
  deployment:
    enabled: true
  ingressRoute:
    enabled: true
  service:
    enabled: true
  ports:
    web:
      port: 80
      expose: true
      exposedPort: 80
      protocol: TCP
    websecure:
      port: 443
      expose: true
      exposedPort: 443
      protocol: TCP
  ssl:
    enabled: true
    permanentRedirect: true
  certResolver:
    letsencrypt:
      enabled: true
      email: your-email@example.com
      storage: /data/acme.json
      dnsChallenge:
        provider: route53
        resolvers:
          - 1.1.1.1:53 