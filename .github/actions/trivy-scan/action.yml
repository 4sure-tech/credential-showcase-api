name: 'Trivy Security Scanner'
description: 'Runs Trivy scanner and generates vulnerability summary'

inputs:
  scan-type:
    description: 'Type of scan to perform (fs/image)'
    required: true
  scan-ref:
    description: 'Reference to scan (path or image)'
    required: true
  scan-title:
    description: 'Title for the scan summary'
    required: true

runs:
  using: "composite"
  steps:
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: ${{ inputs.scan-type }}
        ${{ inputs.scan-type == 'fs' && 'scan-ref' || 'image-ref' }}: ${{ inputs.scan-ref }}
        format: 'json'
        output: 'scan-results.json'
        severity: 'CRITICAL,HIGH,MEDIUM,LOW'
        exit-code: '0'
        scanners: 'vuln'
        skip-dirs: 'node_modules,.git,dist'

    - name: Debug Directory Content
      shell: bash
      run: |
        echo "Contents of scan directory:"
        ls -la ${{ inputs.scan-ref }}
        echo "Package.json content:"
        cat ${{ inputs.scan-ref }}/package.json || echo "No package.json found"
        echo "Scan results:"
        cat scan-results.json

    - name: Generate Scan Summary
      shell: bash
      run: |
        # Function to safely count vulnerabilities
        count_vulnerabilities() {
          local severity=$1
          jq "([.Results[]?.Vulnerabilities[]? | select(.Severity==\"$severity\")] | length) // 0" scan-results.json
        }
        
        # Get counts with null safety
        CRITICAL_COUNT=$(count_vulnerabilities "CRITICAL")
        HIGH_COUNT=$(count_vulnerabilities "HIGH")
        MEDIUM_COUNT=$(count_vulnerabilities "MEDIUM")
        LOW_COUNT=$(count_vulnerabilities "LOW")
        UNKNOWN_COUNT=$(count_vulnerabilities "UNKNOWN")
        
        {
          echo "# ${{ inputs.scan-title }}"
          echo ""
          if [ "$CRITICAL_COUNT" = "0" ] && [ "$HIGH_COUNT" = "0" ] && [ "$MEDIUM_COUNT" = "0" ] && [ "$LOW_COUNT" = "0" ] && [ "$UNKNOWN_COUNT" = "0" ]; then
            echo "No vulnerabilities found"
            echo ""
            echo "Debug Information:"
            echo "\`\`\`"
            echo "Scan Path: ${{ inputs.scan-ref }}"
            echo "Scan Type: ${{ inputs.scan-type }}"
            echo "\`\`\`"
          else
            echo "| Severity  | Count |"
            echo "|-----------|-------|"
            echo "| Critical  | $CRITICAL_COUNT |"
            echo "| High      | $HIGH_COUNT |"
            echo "| Medium    | $MEDIUM_COUNT |"
            echo "| Low       | $LOW_COUNT |"
            echo "| Unknown   | $UNKNOWN_COUNT |"
          fi
          echo ""
          echo "---"
        } >> $GITHUB_STEP_SUMMARY 