name: Credential Showcase API Server CI

on:
  push:
    branches:
      # - main
      - SHOWCASE-90-pipeline-to-build-and-push
    paths:
      - 'apps/credential-showcase-api-server/**'
      - '.github/workflows/credential-showcase-api-server.yml'
      - '.github/workflows/ci-template.yml'
      - '.github/actions/trivy-scan/**'

jobs:
  ci:
    uses: ./.github/workflows/ci-template.yml
    with:
      package_name: credential-showcase-api-server
      package_path: apps
      docker_image: bcshowcase/credential-showcase-api-server
      sonar_project_key: showcase-api-server
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }} 
      repository_url: ${{ secrets.repository_url }}