name: CI Template

on:
  workflow_call:
    inputs:
      app_name:
        required: true
        type: string
      docker_image:
        required: true
        type: string
      sonar_project_key:
        required: true
        type: string
    secrets:
      SONAR_TOKEN:
        required: true
      SONAR_HOST_URL:
        required: true
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false

jobs:
  test:
    name: Test - ${{ inputs.app_name }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install
        working-directory: apps/${{ inputs.app_name }}

      - name: Run Unit Tests
        run: npm test
        working-directory: apps/${{ inputs.app_name }}

  sonar:
    name: SonarQube Analysis - ${{ inputs.app_name }}
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Static Code Analysis with SonarQube
        uses: sonarsource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectBaseDir: apps/${{ inputs.app_name }}
          projectKey: ${{ inputs.sonar_project_key }}

  build:
    name: Build and Push Docker Image - ${{ inputs.app_name }}
    needs: sonar
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: apps/${{ inputs.app_name }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ inputs.docker_image }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ inputs.docker_image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
