{{- if .Values.postgresql.enabled }}
{{- $postgresqlSecretName := printf "%s-postgresql" .Release.Name -}}
{{- $postgresqlSecret := (lookup "v1" "Secret" .Release.Namespace $postgresqlSecretName) -}}
{{- if not $postgresqlSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-postgresql" .Release.Name }}
  namespace: {{ .Values.global.namespaceOverride | default .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "-5"
  #   "helm.sh/resource-policy": keep
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
type: Opaque
data:
  # Use exact key names from the values.yaml secretKeys config
  postgres-password: {{ include "getOrGeneratePass" (dict "Namespace" .Release.Namespace "Kind" "Secret" "Name" (printf "%s-postgresql" .Release.Name) "Key" "postgres-password" "Length" 16) }}
  password: {{ include "getOrGeneratePass" (dict "Namespace" .Release.Namespace "Kind" "Secret" "Name" (printf "%s-postgresql" .Release.Name) "Key" "password" "Length" 16) }}
  username: {{ .Values.postgresql.auth.username | default "postgres" | b64enc }}
{{- end }}
{{- end }} 
