{{- range .Values.services }}
{{- if .serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ if .serviceAccount.name }}{{ .serviceAccount.name }}{{ else }}{{ $.Release.Name }}-{{ .name }}{{ end }}
  namespace: {{ $.Values.namespace }}
  {{- with .serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
---
{{- end }} 